  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png?v=3" sizes="96x96" />

  <!-- manifest NÃO é incluído estaticamente — adicionado só nas páginas da plataforma -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!--
    PWA STRATEGY: manifest e service worker só existem nas páginas da plataforma.
    Na página de login e no site público, o Chrome não detecta nenhum critério de PWA
    → banner de instalar nunca aparece antes do login.
  -->
  <script>
  (function() {
    var path = window.location.pathname;
    var isPlatformPage =
      path.startsWith('/plataforma') ||
      path.startsWith('/curso/') ||
      path.startsWith('/perfil') ||
      path.startsWith('/meu-progresso') ||
      path.startsWith('/favoritos') ||
      path.startsWith('/certificados') ||
      path.startsWith('/admin');

    if (isPlatformPage) {
      // ── Plataforma (logado): ativar PWA ────────────────────────────────
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = '/site.webmanifest?v=3';
      document.head.appendChild(link);

      var metaCap = document.createElement('meta');
      metaCap.name = 'mobile-web-app-capable';
      metaCap.content = 'yes';
      document.head.appendChild(metaCap);

      var metaApple = document.createElement('meta');
      metaApple.name = 'apple-mobile-web-app-capable';
      metaApple.content = 'yes';
      document.head.appendChild(metaApple);

      // Captura prompt para mostrar DENTRO da plataforma
      window.__pwaPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
      });
    } else {
      // ── Login / site público: suprimir TODO critério de PWA ─────────────
      // 1. Bloquear qualquer prompt que escape
      window.__pwaPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault(); // descarta — não guarda
      });
      // 2. Desregistrar SW existente
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    }
  })();
  </script>
