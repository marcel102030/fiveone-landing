  <!--
    PWA: captura beforeinstallprompt GLOBALMENTE antes do React carregar.
    - e.preventDefault() suprime o banner nativo do browser em QUALQUER página
    - window.__pwaPrompt guarda o evento para uso posterior
    - Nosso componente PWAInstallBanner só exibe o UI quando o usuário está logado
  -->
  <script>
  window.__pwaPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window.__pwaPrompt = e;
  });
  </script>
