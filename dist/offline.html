<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a192f" />
  <title>Sem conexão — Five One</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background-color: #0a192f;
      color: #ccd6f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      width: 72px;
      height: 72px;
      background: rgba(100, 255, 218, 0.08);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      color: #64ffda;
      stroke: currentColor;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e6f1ff;
      margin-bottom: 12px;
    }

    p {
      font-size: 0.95rem;
      color: #8892b0;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #64ffda;
      color: #0a192f;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      min-height: 44px;
    }

    .btn:hover { opacity: 0.85; }

    .logo {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #64ffda;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <span class="logo">FIVE ONE</span>

  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>Você está offline</h1>
  <p>Não foi possível carregar a plataforma. Verifique sua conexão com a internet e tente novamente.</p>

  <button class="btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
    </svg>
    Tentar novamente
  </button>
</body>
</html>
